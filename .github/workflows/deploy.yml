name: Deploy to VPS

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TAG_NAME
          command_timeout: 30m
          script: |
            set -e
            echo "Deploying tag: $TAG_NAME"

            cd /opt/docx-template-system

            # Pull latest code
            git fetch --tags --force
            git checkout "$TAG_NAME"

            # Rebuild and deploy
            docker compose build
            docker compose run --rm --user root app npx prisma db push
            docker compose up -d --remove-orphans

            # Health check
            echo "Waiting for service to start..."
            sleep 15

            # Check main app
            if curl -sf http://127.0.0.1:8060 > /dev/null; then
              echo "✅ App is running"
            else
              echo "❌ App not responding"
              docker compose logs --tail=50 app
              exit 1
            fi

            # Check collab server (WebSocket port)
            if timeout 5 bash -c 'exec 3<>/dev/tcp/127.0.0.1/8072'; then
              echo "✅ Collab server is running"
            else
              echo "❌ Collab server not responding"
              docker compose logs --tail=50 collab
              exit 1
            fi

            echo "✅ Deploy successful - all services are running"
