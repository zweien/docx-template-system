        - complementary "Applications Documentation" [ref=e995]:
          - generic [ref=e999]:
            - heading "Applications" [level=1] [ref=e1000]
            - paragraph [ref=e1001]:
              - text: Applications, as defined in authentik, are used to configure and separate the authorization/access control and the appearance of a specific software application in the
              - strong [ref=e1002]: My applications
              - text: page.
            - paragraph [ref=e1003]: When a user logs into authentik, they see a list of the applications for which authentik is configured to provide authentication and authorization (the applications that they are authorized to use).
            - paragraph [ref=e1004]:
              - text: Applications are the "other half" of providers. They typically exist in a 1-to-1 relationship; each application needs a provider and every provider can be used with one application. Applications can, however, use specific, additional providers to augment the functionality of the main provider. For more information, see
              - link "Backchannel providers" [ref=e1005] [cursor=pointer]:
                - /url: https://next.goauthentik.io/add-secure-apps/applications/manage_apps
              - text: .
            - paragraph [ref=e1006]:
              - text: Furthermore, the
              - link "RAC (Remote Access Control)" [ref=e1007] [cursor=pointer]:
                - /url: https://next.goauthentik.io/add-secure-apps/providers/rac/
              - text: feature uses a single application and a single provider, but multiple "endpoints". An endpoint defines each remote machine.
            - generic [ref=e1009]:
              - generic [ref=e1011]: 
              - paragraph [ref=e1012]:
                - text: For information about creating and managing applications, refer to
                - link "Manage applications" [ref=e1013] [cursor=pointer]:
                  - /url: https://next.goauthentik.io/add-secure-apps/applications/manage_apps
                - text: .
            - heading "Appearance" [level=2] [ref=e1014]
            - paragraph [ref=e1015]: "Applications are displayed to users when:"
            - list [ref=e1016]:
              - listitem [ref=e1017]: The user has access defined via policies (or the application has no policies bound)
              - listitem [ref=e1018]: A valid Launch URL is configured/could be guessed, this consists of URLs starting with http:// and https://
            - paragraph [ref=e1019]: "The following options can be configured:"
            - list [ref=e1020]:
              - listitem [ref=e1021]:
                - paragraph [ref=e1022]:
                  - emphasis [ref=e1023]: Name
                  - text: ": This is the name shown for the application card"
              - listitem [ref=e1024]:
                - paragraph [ref=e1025]:
                  - emphasis [ref=e1026]: Launch URL
                  - text: ": The URL that is opened when a user clicks on the application. When left empty, authentik tries to guess it based on the provider"
                - paragraph [ref=e1027]:
                  - text: You can use placeholders in the launch url to build them dynamically based on the logged in user. For example, you can set the Launch URL to
                  - code [ref=e1028]: https://goauthentik.io/%(username)s
                  - text: ", which will be replaced with the currently logged in user's username."
                - paragraph [ref=e1029]:
                  - text: For a reference of all fields available, see
                  - link "the API schema for the User object" [ref=e1030] [cursor=pointer]:
                    - /url: https://api.goauthentik.io/reference/core-users-retrieve/
                  - text: .
                - paragraph [ref=e1031]:
                  - text: Only applications whose launch URL starts with
                  - code [ref=e1032]: http://
                  - text: or
                  - code [ref=e1033]: https://
                  - text: or are relative URLs are shown on the users'
                  - strong [ref=e1034]: My applications
                  - text: page. This can also be used to hide applications that shouldn't be visible on the
                  - strong [ref=e1035]: My applications
                  - text: page but are still accessible by users, by setting the
                  - emphasis [ref=e1036]: Launch URL
                  - text: to
                  - code [ref=e1037]: blank://blank
                  - text: .
              - listitem [ref=e1038]:
                - paragraph [ref=e1039]:
                  - emphasis [ref=e1040]: Icon (URL)
                  - text: ": Optionally configure an Icon for the application"
                - paragraph [ref=e1041]:
                  - text: If the authentik server does not have a volume mounted under
                  - code [ref=e1042]: /media
                  - text: ", you'll get a text input. This accepts absolute URLs. If you've mounted single files into the container, you can reference them using"
                  - code [ref=e1043]: https://authentik.company/media/my-file.png
                  - text: .
                - paragraph [ref=e1044]:
                  - text: If there is a mount under
                  - code [ref=e1045]: /media
                  - text: or if
                  - link "S3 storage" [ref=e1046] [cursor=pointer]:
                    - /url: https://next.goauthentik.io/sys-mgmt/ops/storage-s3
                  - text: is configured, you'll instead see a field to upload a file.
