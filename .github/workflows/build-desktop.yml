name: Build Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release?'
        type: boolean
        default: true

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Merge tagged branch into master
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $tag = "${{ github.ref_name }}"
          $sha = git rev-parse $tag
          $branch = git branch -r --contains $sha --format "%(refname:short)" | Select-Object -First 1
          if ($branch -and $branch -ne "origin/master") {
            $localBranch = $branch -replace "origin/", ""
            git merge origin/$localBranch --no-ff -m "merge: $tag"
            git push origin master
            Write-Host "Merged $localBranch into master"
          } else {
            Write-Host "Tag is already on master, skipping merge"
          }

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Node dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Install Python dependencies
        working-directory: apps/desktop/sidecar
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python sidecar
        working-directory: apps/desktop/sidecar
        shell: pwsh
        run: |
          $sidecarDir = Join-Path $env:GITHUB_WORKSPACE "apps/desktop/src-tauri/sidecar"
          if (Test-Path $sidecarDir) { Remove-Item -Recurse -Force $sidecarDir }
          New-Item -ItemType Directory -Path $sidecarDir -Force | Out-Null

          $srcDir = Join-Path $env:GITHUB_WORKSPACE "apps/desktop/sidecar"

          pyinstaller `
            --name budget-sidecar `
            --onedir --clean --noconfirm `
            --distpath $sidecarDir `
            --workpath "$env:RUNNER_TEMP\sidecar-build-work" `
            --specpath "$env:RUNNER_TEMP\sidecar-build-work" `
            --add-data "$srcDir\api;api" `
            --add-data "$srcDir\scripts;scripts" `
            --add-data "$srcDir\report_engine;report_engine" `
            --hidden-import report_engine `
            --hidden-import report_engine.blocks `
            --hidden-import report_engine.renderer `
            --hidden-import report_engine.subdoc `
            --hidden-import report_engine.template_parser `
            --hidden-import report_engine.converter `
            --hidden-import report_engine.prompt_parser `
            --hidden-import report_engine.schema `
            --hidden-import report_engine.budget `
            --hidden-import report_engine.budget.parse_excel `
            --hidden-import report_engine.budget.models `
            --hidden-import report_engine.budget.validate_excel `
            --hidden-import report_engine.budget.build_payload `
            --hidden-import report_engine.validator `
            --hidden-import report_engine.compat `
            --hidden-import report_engine.template_checker `
            --hidden-import report_engine.style_checker `
            --hidden-import docxtpl `
            --hidden-import docx `
            --hidden-import openpyxl `
            --hidden-import latex2mathml `
            --hidden-import yaml `
            --collect-data docxtpl `
            main.py

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        if: github.event_name == 'push' || inputs.create_release == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: 'Desktop v__VERSION__'
          releaseBody: '预算报告生成器 Desktop v__VERSION__'
          releaseDraft: true
          prerelease: false

      - name: Build only (no release)
        if: github.event_name == 'workflow_dispatch' && inputs.create_release != true
        working-directory: apps/desktop
        run: npm run tauri build

      - name: Get version
        id: version
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          echo "version=$($json.version)" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: budget-report-desktop-${{ steps.version.outputs.version }}-windows-x64
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
