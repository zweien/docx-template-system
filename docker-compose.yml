services:
  app:
    build: .
    ports:
      - "0.0.0.0:8060:8060"
    env_file: .env.production
    environment:
      - PYTHON_SERVICE_URL=http://python-service:8065
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - uploads:/app/public/uploads
      - collection-uploads:/app/.data/uploads
      - backups:/app/.data/backups
    networks:
      - default
      - sso_net

  python-service:
    build: ./python-service
    environment:
      - PORT=8065
    restart: unless-stopped
    volumes:
      - uploads:/app/public/uploads:ro

  collab:
    build: .
    ports:
      - "0.0.0.0:8072:8072"
    env_file: .env.production
    environment:
      - Y_WS_PORT=8072
      - Y_WS_PERSISTENCE_DIR=/app/y-websocket-db
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - collab-persistence:/app/y-websocket-db
    networks:
      - default
    command: ["node", "y-websocket-server/server.cjs"]

volumes:
  uploads:
  collection-uploads:
  backups:
  collab-persistence:

networks:
  sso_net:
    external: true
    name: deploy_sso_net
